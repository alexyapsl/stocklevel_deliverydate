<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Level Check</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .stock-low { background-color: #dcfce7; color: #166534; }
    .stock-medium { background-color: #fef9c3; color: #713f12; }
    .stock-high { background-color: #fee2e2; color: #991b1b; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 9999px; margin-right: 6px; }
    .status-dot.green { background-color: #22c55e; }
    .status-dot.yellow { background-color: #eab308; }
    .status-dot.red { background-color: #ef4444; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background-color: #f9fafb; font-weight: 600; color: #374151; }
    tr:hover { background-color: #f9fafb; }
    .last-updated { font-size: 12px; color: #6b7280; }

    /* Horizontal scroll container */
    .table-container {
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 #f1f5f9;
    }
    .table-container::-webkit-scrollbar {
      height: 6px;
    }
    .table-container::-webkit-scrollbar-thumb {
      background-color: #94a3b8;
      border-radius: 3px;
    }

    /* Freeze first two columns */
    .freeze-col {
      position: sticky;
      left: 0;
      background: white;
      z-index: 10;
    }
    .freeze-col-2 {
      position: sticky;
      left: 80px; /* width of SKU column */
      background: white;
      z-index: 10;
      box-shadow: 4px 0 6px -1px rgb(0 0 0 / 0.1);
    }

    .scroll-btn {
      @apply px-3 py-1 bg-white border border-gray-200 hover:bg-gray-50 rounded-xl text-sm font-medium transition-colors;
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Password Gate -->
  <div id="password-gate" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm">
      <h1 class="text-2xl font-semibold text-gray-900 mb-2">Stock Level Check</h1>
      <p class="text-gray-500 text-sm mb-6">Please enter access password</p>
      
      <input type="password" id="password-input"
        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
        placeholder="Enter password"
        onkeypress="if (event.key === 'Enter') checkPassword()">
      
      <button onclick="checkPassword()"
        class="mt-3 w-full bg-gray-900 hover:bg-black text-white py-3 rounded-xl text-sm font-medium transition-colors">
        Access Dashboard
      </button>
      
      <p id="password-error" class="hidden text-red-500 text-xs mt-3 text-center">Incorrect password. Please try again.</p>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="dashboard" class="hidden min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-y-4">
        <div>
          <h1 class="text-3xl font-semibold text-gray-900">Stock Level Check</h1>
          <p class="text-sm text-gray-500 mt-1">Samsung HK — Internal Tool</p>
        </div>
        
        <div class="flex items-center gap-x-3">
          <div class="text-right hidden md:block">
            <div class="last-updated" id="last-updated">Last updated: —</div>
            <div class="text-[10px] text-gray-400" id="sku-count"></div>
          </div>
          
          <button onclick="refreshData()"
            class="px-4 py-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-xl text-sm font-medium flex items-center gap-x-2 transition-colors">
            <span>⟳</span>
            <span>Refresh</span>
          </button>
        </div>
      </div>

      <!-- Search + Filters -->
      <div class="flex flex-col md:flex-row gap-3 mb-4">
        <input type="text" id="search-input"
          class="flex-1 px-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          placeholder="Search by product name..."
          oninput="applyFilters()">

        <select id="filter-stock" onchange="applyFilters()"
          class="px-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Stock: All</option>
          <option value="in">In Stock (≥1)</option>
          <option value="low">Low Stock (1-10)</option>
          <option value="out">Out of Stock (0)</option>
        </select>

        <select id="filter-eta" onchange="applyFilters()"
          class="px-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">ETA: All</option>
        </select>

        <!-- Scroll controls (visible on mobile) -->
        <div class="flex items-center gap-2 md:hidden mt-1">
          <button onclick="scrollLeft()" class="scroll-btn">←</button>
          <button onclick="scrollRight()" class="scroll-btn">→</button>
        </div>
      </div>

      <!-- Table with horizontal scroll -->
      <div id="table-container" class="table-container bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
        <table class="w-full min-w-[800px]">
          <thead>
            <tr>
              <th class="w-28 freeze-col">SKU</th>
              <th class="freeze-col-2 min-w-[280px]">Product Name</th>
              <th class="w-40 text-center">Stock Level</th>
              <th class="w-48">Shipping ETA</th>
            </tr>
          </thead>
          <tbody id="table-body" class="text-sm text-gray-700"></tbody>
        </table>
      </div>

      <div class="mt-4 text-[11px] text-gray-400 px-1">
        Data source: Samsung Shop API • Values are live at time of refresh
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = "samsunghk2026";
    const JSON_URL = "data/products.json";
    const API_BASE = "https://shop.samsung.com/hk/servicesv2/getSimpleProductsInfo";
    const MAX_SKUS_PER_CALL = 4;

    let hasAccess = false;
    let cachedProducts = [];
    let cachedStockMap = {};

    function checkPassword() {
      const input = document.getElementById("password-input");
      const errorEl = document.getElementById("password-error");
      
      if (input.value === PASSWORD) {
        hasAccess = true;
        errorEl.classList.add("hidden");
        document.getElementById("password-gate").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        loadInitialData();
      } else {
        errorEl.classList.remove("hidden");
        input.value = "";
        input.focus();
      }
    }

    function getStockClass(stockLevel) {
      if (stockLevel <= 5)  return { bg: "stock-high",   dot: "red" };
      if (stockLevel <= 10) return { bg: "stock-medium", dot: "yellow" };
      return { bg: "stock-low",    dot: "green" };
    }

    function updateLastUpdated() {
      const el = document.getElementById("last-updated");
      const now = new Date();
      el.textContent = `Last updated: ${now.toLocaleString("en-HK", { 
        month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
      })}`;
    }

    function updateSkuCount(count) {
      document.getElementById("sku-count").textContent = `${count} SKUs`;
    }

    async function fetchStockData(skus) {
      if (!skus.length) return [];
      const results = [];
      for (let i = 0; i < skus.length; i += MAX_SKUS_PER_CALL) {
        const batch = skus.slice(i, i + MAX_SKUS_PER_CALL);
        const params = batch.map(sku => `productCodes=${sku}`).join("&");
        const url = `${API_BASE}?${params}`;
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const json = await response.json();
          if (json.productDatas && Array.isArray(json.productDatas)) {
            results.push(...json.productDatas);
          }
        } catch (error) {
          console.error("Failed to fetch batch:", batch, error);
          batch.forEach(sku => {
            results.push({ productCode: sku, stockLevel: "—", shippingETA: "Error" });
          });
        }
      }
      return results;
    }

    function renderTable(products, stockMap) {
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = "";
      products.forEach(product => {
        const stockInfo = stockMap[product.sku] || { stockLevel: "—", shippingETA: "—" };
        const raw = stockInfo.stockLevel;
        const stockLevel = (raw === "—" || raw === null || raw === undefined) ? 0 : parseInt(raw);
        const style = getStockClass(stockLevel);
        const displayStock = (stockLevel === 0) ? "OUT OF STOCK" : stockLevel;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="font-mono text-xs text-gray-500 freeze-col">${product.sku}</td>
          <td class="font-medium freeze-col-2">${product.name}</td>
          <td class="text-center">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium ${style.bg}">
              <span class="status-dot ${style.dot}"></span>
              ${displayStock}
            </span>
          </td>
          <td class="text-gray-600">${stockInfo.shippingETA || "—"}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function applyFilters() {
      const searchTerm = document.getElementById("search-input").value.toLowerCase().trim();
      const stockFilter = document.getElementById("filter-stock").value;
      const etaFilter = document.getElementById("filter-eta").value;

      let filtered = cachedProducts;

      // Search filter
      if (searchTerm) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
      }

      // Stock level filter
      if (stockFilter) {
        filtered = filtered.filter(p => {
          const info = cachedStockMap[p.sku];
          const level = info && info.stockLevel !== "—" ? parseInt(info.stockLevel) : 0;
          if (stockFilter === "in") return level >= 1;
          if (stockFilter === "low") return level >= 1 && level <= 10;
          if (stockFilter === "out") return level === 0;
          return true;
        });
      }

      // ETA filter
      if (etaFilter) {
        filtered = filtered.filter(p => {
          const info = cachedStockMap[p.sku];
          const etaValue = (info?.shippingETA || "").trim();

          if (etaFilter === "__no_eta__") {
            return !etaValue || etaValue === "—";
          }
          if (etaFilter === "__has_eta__") {
            return etaValue && etaValue !== "—";
          }
          const etaKey = etaValue.substring(0, 10);
          return etaKey === etaFilter;
        });
      }

      renderTable(filtered, cachedStockMap);
    }

    function populateEtaFilter(products) {
      const etaSelect = document.getElementById("filter-eta");
      if (!etaSelect) return;

      const uniqueEtaKeys = new Set();

      products.forEach(p => {
        const info = cachedStockMap[p.sku];
        if (info && info.shippingETA && info.shippingETA !== "—") {
          const key = info.shippingETA.substring(0, 10);
          if (key) uniqueEtaKeys.add(key);
        }
      });

      while (etaSelect.options.length > 1) {
        etaSelect.remove(1);
      }

      const noEtaOption = document.createElement("option");
      noEtaOption.value = "__no_eta__";
      noEtaOption.textContent = "No ETA";
      etaSelect.appendChild(noEtaOption);

      const hasEtaOption = document.createElement("option");
      hasEtaOption.value = "__has_eta__";
      hasEtaOption.textContent = "Has ETA";
      etaSelect.appendChild(hasEtaOption);

      Array.from(uniqueEtaKeys).sort().forEach(key => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = key;
        etaSelect.appendChild(option);
      });
    }

    function scrollLeft() {
      const container = document.getElementById("table-container");
      if (container) container.scrollBy({ left: -300, behavior: "smooth" });
    }

    function scrollRight() {
      const container = document.getElementById("table-container");
      if (container) container.scrollBy({ left: 300, behavior: "smooth" });
    }

    async function loadInitialData() {
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-gray-400 text-sm">Loading SKUs and stock data...</td></tr>`;

      try {
        const res = await fetch(JSON_URL);
        if (!res.ok) throw new Error("Failed to load products.json");
        const products = await res.json();
        cachedProducts = products;

        const skus = products.map(p => p.sku);
        const stockResults = await fetchStockData(skus);

        cachedStockMap = {};
        stockResults.forEach(item => {
          cachedStockMap[item.productCode] = {
            stockLevel: item.stockLevel ?? "—",
            shippingETA: item.shippingETA ?? "—"
          };
        });

        updateSkuCount(products.length);
        renderTable(products, cachedStockMap);
        updateLastUpdated();
        populateEtaFilter(products);

        const searchInput = document.getElementById("search-input");
        const stockSelect = document.getElementById("filter-stock");
        const etaSelect = document.getElementById("filter-eta");

        if (searchInput) searchInput.oninput = applyFilters;
        if (stockSelect) stockSelect.onchange = applyFilters;
        if (etaSelect) etaSelect.onchange = applyFilters;

      } catch (error) {
        console.error(error);
        tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-red-500 text-sm">Failed to load data. Check console for details.</td></tr>`;
      }
    }

    async function refreshData() {
      if (!cachedProducts.length) return;
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-gray-400 text-sm">Refreshing stock data...</td></tr>`;

      try {
        const skus = cachedProducts.map(p => p.sku);
        const stockResults = await fetchStockData(skus);

        cachedStockMap = {};
        stockResults.forEach(item => {
          cachedStockMap[item.productCode] = {
            stockLevel: item.stockLevel ?? "—",
            shippingETA: item.shippingETA ?? "—"
          };
        });

        renderTable(cachedProducts, cachedStockMap);
        updateLastUpdated();

      } catch (error) {
        console.error(error);
        tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-8 text-center text-red-500 text-sm">Refresh failed.</td></tr>`;
      }
    }

    window.onload = () => {
      const pwInput = document.getElementById("password-input");
      if (pwInput) pwInput.focus();
    };
  </script>
</body>
</html>
