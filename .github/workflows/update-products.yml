name: Update products.json from Google Sheet

on:
  workflow_dispatch:
    description: 'Manually update products.json from Google Sheet'
  repository_dispatch:
    types: [update-products]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-products.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git commit --allow-empty -m "chore: update products.json from Google Sheet [$(date '+%Y-%m-%d %H:%M')]"
          git push
        env:
          GITHUB_TOKEN: *** secrets.STOCKLEVELUPDATER }}